<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>SNS写真 危険チェック</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family:
        "Hiragino Sans",
        "Yu Gothic",
        "Meiryo",
        sans-serif;
    }

    .risk-circle {
      position: absolute;
      border: 4px solid red;
      border-radius: 9999px;
      pointer-events: none;
    }

    .risk-label {
      position: absolute;
      top: -32px;
      left: 0;
      white-space: nowrap;
      background: red;
      color: white;
      font-size: 12px;
      font-weight: bold;
      border-radius: 9999px;
      padding: 4px 10px;
    }
  </style>
</head>

<body class="bg-slate-100 min-h-screen p-4 md:p-8">

  <div class="max-w-6xl mx-auto">

    <div class="bg-white rounded-3xl shadow-sm p-6 mb-6">
      <h1 class="text-3xl md:text-5xl font-bold">
        SNS写真 危険チェック
      </h1>

      <p class="mt-4 text-slate-600">
        顔・電話番号・住所・学校名・看板などをAIで検出します
      </p>

      <div class="flex flex-wrap gap-3 mt-6">

        <input
          type="file"
          id="fileInput"
          accept="image/*"
          class="hidden"
        />

        <button
          id="selectBtn"
          class="bg-blue-600 text-white px-5 py-3 rounded-xl font-bold"
        >
          写真を選ぶ
        </button>

        <button
          id="checkBtn"
          class="bg-black text-white px-5 py-3 rounded-xl font-bold disabled:opacity-40"
          disabled
        >
          AIチェック
        </button>

      </div>

      <div class="mt-4">
        <div class="bg-slate-200 rounded-full h-2 overflow-hidden">
          <div
            id="progressBar"
            class="bg-blue-600 h-full w-0 transition-all"
          ></div>
        </div>

        <p
          id="statusText"
          class="text-sm font-bold text-slate-700 mt-3"
        >
          写真を選んでください
        </p>
      </div>
    </div>

    <div class="grid lg:grid-cols-[1.4fr_0.9fr] gap-6">

      <div class="bg-white rounded-3xl p-4 shadow-sm">

        <div
          id="imageArea"
          class="relative bg-slate-50 rounded-2xl min-h-[450px] flex items-center justify-center"
        >

          <div id="emptyState" class="text-center text-slate-400">
            <div class="text-5xl">◎</div>
            <p class="font-bold mt-2">
              写真を選択してください
            </p>
          </div>

          <div
            id="previewWrap"
            class="relative hidden w-full"
          >
            <img
              id="previewImage"
              class="w-full rounded-2xl"
            />

            <div
              id="overlay"
              class="absolute inset-0"
            ></div>

          </div>
        </div>
      </div>

      <div class="space-y-6">

        <div class="bg-white rounded-3xl p-5 shadow-sm">

          <div class="flex items-center justify-between">

            <h2 class="text-xl font-bold">
              危険度
            </h2>

            <span
              id="riskBadge"
              class="bg-green-50 text-green-700 px-4 py-2 rounded-full text-sm font-bold"
            >
              未チェック
            </span>

          </div>

          <p class="mt-4 text-sm text-slate-600">
            検出数：
            <span
              id="riskCount"
              class="font-bold text-slate-900"
            >
              0
            </span>
            件
          </p>
        </div>

        <div class="bg-white rounded-3xl p-5 shadow-sm">

          <h2 class="text-xl font-bold mb-4">
            検出結果
          </h2>

          <div
            id="riskList"
            class="space-y-3 text-sm"
          >
            まだ検出結果はありません
          </div>
        </div>

        <div class="bg-slate-900 rounded-3xl p-5 shadow-sm text-white">

          <h2 class="text-xl font-bold mb-4">
            OCR結果
          </h2>

          <pre
            id="ocrText"
            class="bg-white/10 rounded-2xl p-4 text-sm whitespace-pre-wrap overflow-auto max-h-64"
          >
まだOCR結果はありません
          </pre>
        </div>
      </div>
    </div>
  </div>

  <script>

    // =========================
    // API KEY
    // =========================

    const GOOGLE_VISION_API_KEY = "ここにAPIキー";

    // =========================
    // ELEMENTS
    // =========================

    const fileInput = document.getElementById("fileInput");
    const selectBtn = document.getElementById("selectBtn");
    const checkBtn = document.getElementById("checkBtn");
    const previewImage = document.getElementById("previewImage");
    const previewWrap = document.getElementById("previewWrap");
    const emptyState = document.getElementById("emptyState");
    const overlay = document.getElementById("overlay");
    const statusText = document.getElementById("statusText");
    const progressBar = document.getElementById("progressBar");
    const riskList = document.getElementById("riskList");
    const riskCount = document.getElementById("riskCount");
    const riskBadge = document.getElementById("riskBadge");
    const ocrText = document.getElementById("ocrText");

    let selectedFile = null;
    let imageBase64 = "";

    // =========================
    // SELECT IMAGE
    // =========================

    selectBtn.addEventListener("click", () => {
      fileInput.click();
    });

    fileInput.addEventListener("change", async (e) => {

      const file = e.target.files[0];
      if (!file) return;

      selectedFile = file;

      const url = URL.createObjectURL(file);

      previewImage.src = url;

      previewWrap.classList.remove("hidden");
      emptyState.classList.add("hidden");

      checkBtn.disabled = false;

      statusText.textContent =
        "画像を読み込みました";

      imageBase64 = await toBase64(file);

    });

    // =========================
    // BASE64
    // =========================

    function toBase64(file) {

      return new Promise((resolve, reject) => {

        const reader = new FileReader();

        reader.readAsDataURL(file);

        reader.onload = () => {
          resolve(
            reader.result.split(",")[1]
          );
        };

        reader.onerror = reject;

      });
    }

    // =========================
    // CHECK
    // =========================

    checkBtn.addEventListener("click", async () => {

      overlay.innerHTML = "";
      riskList.innerHTML = "";

      setProgress(10);

      statusText.textContent =
        "Google Vision APIで解析中...";

      try {

        const response = await fetch(
          `https://vision.googleapis.com/v1/images:annotate?key=${AIzaSyDsob6xE6KrCkSuTbvuJNQR7KYZ3LGcaGY}`,
          {
            method: "POST",

            headers: {
              "Content-Type": "application/json",
            },

            body: JSON.stringify({

              requests: [

                {
                  image: {
                    content: imageBase64
                  },

                  features: [

                    {
                      type: "TEXT_DETECTION",
                      maxResults: 50
                    },

                    {
                      type: "FACE_DETECTION",
                      maxResults: 20
                    },

                    {
                      type: "LANDMARK_DETECTION",
                      maxResults: 10
                    },

                    {
                      type: "LOGO_DETECTION",
                      maxResults: 20
                    },

                    {
                      type: "LABEL_DETECTION",
                      maxResults: 30
                    }

                  ]

                }

              ]

            })

          }
        );

        setProgress(60);

        const data = await response.json();

        console.log(data);

        const result =
          data.responses[0];

        const risks = [];

        // =========================
        // OCR
        // =========================

        if (
          result.fullTextAnnotation &&
          result.fullTextAnnotation.text
        ) {

          ocrText.textContent =
            result.fullTextAnnotation.text;

        }

        // =========================
        // FACE
        // =========================

        if (result.faceAnnotations) {

          result.faceAnnotations.forEach(
            (face, index) => {

              const vertices =
                face.boundingPoly.vertices;

              addCircle(
                vertices,
                "顔",
                "red"
              );

              risks.push({
                label: "顔",
                text:
                  "顔が認識できる可能性があります"
              });

            }
          );
        }

        // =========================
        // TEXT
        // =========================

        if (result.textAnnotations) {

          result.textAnnotations
            .slice(1)
            .forEach((text) => {

              const value =
                text.description;

              if (
                isDangerousText(value)
              ) {

                addCircle(
                  text.boundingPoly.vertices,
                  "文字",
                  "#2563eb"
                );

                risks.push({
                  label: "文字情報",
                  text: value
                });

              }

            });
        }

        // =========================
        // LANDMARK
        // =========================

        if (result.landmarkAnnotations) {

          result.landmarkAnnotations
            .forEach((landmark) => {

              risks.push({
                label:
                  "ランドマーク",
                text:
                  landmark.description
              });

            });

        }

        // =========================
        // LOGO
        // =========================

        if (result.logoAnnotations) {

          result.logoAnnotations
            .forEach((logo) => {

              risks.push({
                label: "ロゴ",
                text:
                  logo.description
              });

            });

        }

        // =========================
        // UI
        // =========================

        riskCount.textContent =
          risks.length;

        if (risks.length === 0) {

          riskBadge.textContent =
            "低";

          riskBadge.className =
            "bg-green-50 text-green-700 px-4 py-2 rounded-full text-sm font-bold";

        }
        else if (risks.length <= 3) {

          riskBadge.textContent =
            "中";

          riskBadge.className =
            "bg-yellow-50 text-yellow-700 px-4 py-2 rounded-full text-sm font-bold";

        }
        else {

          riskBadge.textContent =
            "高";

          riskBadge.className =
            "bg-red-50 text-red-700 px-4 py-2 rounded-full text-sm font-bold";

        }

        if (risks.length === 0) {

          riskList.innerHTML =
            "危険候補は見つかりませんでした";

        }
        else {

          risks.forEach((risk) => {

            const div =
              document.createElement("div");

            div.className =
              "border rounded-2xl p-3 bg-slate-50";

            div.innerHTML = `
              <div class="font-bold">
                ${risk.label}
              </div>

              <div class="text-slate-600 mt-1">
                ${risk.text}
              </div>
            `;

            riskList.appendChild(div);

          });

        }

        setProgress(100);

        statusText.textContent =
          "解析完了";

      }
      catch (e) {

        console.error(e);

        statusText.textContent =
          "エラーが発生しました";

      }

    });

    // =========================
    // DANGEROUS TEXT
    // =========================

    function isDangerousText(text) {

      const value =
        String(text || "");

      if (
        /0\d{1,4}-?\d{1,4}-?\d{4}/
          .test(value)
      ) {
        return true;
      }

      if (
        /(学校|小学校|中学校|高校|大学|駅|病院|クリニック|丁目|番地|マンション|アパート|店)/
          .test(value)
      ) {
        return true;
      }

      if (
        /(市|区|町|村|県|府|道)/
          .test(value)
      ) {
        return true;
      }

      return false;

    }

    // =========================
    // DRAW
    // =========================

    function addCircle(
      vertices,
      label,
      color
    ) {

      const xs =
        vertices.map(v => v.x || 0);

      const ys =
        vertices.map(v => v.y || 0);

      const minX =
        Math.min(...xs);

      const minY =
        Math.min(...ys);

      const maxX =
        Math.max(...xs);

      const maxY =
        Math.max(...ys);

      const width =
        maxX - minX;

      const height =
        maxY - minY;

      const imgW =
        previewImage.naturalWidth;

      const imgH =
        previewImage.naturalHeight;

      const div =
        document.createElement("div");

      div.className =
        "risk-circle";

      div.style.borderColor =
        color;

      div.style.left =
        `${(minX / imgW) * 100}%`;

      div.style.top =
        `${(minY / imgH) * 100}%`;

      div.style.width =
        `${(width / imgW) * 100}%`;

      div.style.height =
        `${(height / imgH) * 100}%`;

      const tag =
        document.createElement("div");

      tag.className =
        "risk-label";

      tag.style.background =
        color;

      tag.textContent =
        label;

      div.appendChild(tag);

      overlay.appendChild(div);

    }

    // =========================
    // PROGRESS
    // =========================

    function setProgress(value) {

      progressBar.style.width =
        `${value}%`;

    }

  </script>
</body>
</html>
