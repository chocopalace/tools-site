<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SNS写真 危険チェック</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    }

    .risk-circle {
      position: absolute;
      border: 4px solid red;
      border-radius: 9999px;
      pointer-events: none;
      box-sizing: border-box;
    }

    .risk-label {
      position: absolute;
      top: -30px;
      left: 0;
      white-space: nowrap;
      color: white;
      font-size: 12px;
      font-weight: bold;
      border-radius: 9999px;
      padding: 4px 10px;
    }
  </style>
</head>

<body class="min-h-screen bg-slate-100 text-slate-900">
  <main class="mx-auto max-w-6xl p-4 md:p-8">
    <section class="mb-6 rounded-3xl bg-white p-6 shadow-sm">
      <h1 class="text-3xl font-bold md:text-5xl">SNS写真 危険チェック</h1>

      <p class="mt-4 text-slate-600">
        顔・電話番号・住所・学校名・看板などをAIで検出します。
      </p>

      <div class="mt-6 flex flex-wrap gap-3">
        <input id="fileInput" type="file" accept="image/*" class="hidden" />

        <button id="selectBtn" class="rounded-xl bg-blue-600 px-5 py-3 font-bold text-white">
          写真を選ぶ
        </button>

        <button id="checkBtn" class="rounded-xl bg-black px-5 py-3 font-bold text-white disabled:opacity-40" disabled>
          AIチェック
        </button>

        <button id="resetBtn" class="rounded-xl bg-slate-200 px-5 py-3 font-bold text-slate-700">
          リセット
        </button>

        <button id="saveBlurBtn" class="rounded-xl bg-green-600 px-5 py-3 font-bold text-white disabled:opacity-40" disabled>
          ぼかし画像を保存
        </button>
      </div>

      <div class="mt-4 h-2 overflow-hidden rounded-full bg-slate-200">
        <div id="progressBar" class="h-full w-0 bg-blue-600 transition-all"></div>
      </div>

      <p id="statusText" class="mt-3 text-sm font-bold text-slate-700">
        写真を選んでください。
      </p>
    </section>

    <section class="grid gap-6 lg:grid-cols-[1.4fr_0.9fr]">
      <div class="rounded-3xl bg-white p-4 shadow-sm">
        <div class="relative flex min-h-[450px] items-center justify-center rounded-2xl bg-slate-50">
          <div id="emptyState" class="text-center text-slate-400">
            <div class="text-5xl">◎</div>
            <p class="mt-2 font-bold">写真を選択してください</p>
          </div>

          <div id="previewWrap" class="relative hidden w-full overflow-hidden rounded-2xl">
            <img id="previewImage" class="w-full rounded-2xl" alt="選択した写真" />
            <div id="overlay" class="absolute inset-0 pointer-events-none"></div>
          </div>
        </div>
      </div>

      <aside class="space-y-6">
        <div class="rounded-3xl bg-white p-5 shadow-sm">
          <div class="flex items-center justify-between">
            <h2 class="text-xl font-bold">危険度</h2>
            <span id="riskBadge" class="rounded-full bg-green-50 px-4 py-2 text-sm font-bold text-green-700">
              未チェック
            </span>
          </div>

          <p class="mt-4 text-sm text-slate-600">
            検出数：<span id="riskCount" class="font-bold text-slate-900">0</span>件
          </p>
        </div>

        <div class="rounded-3xl bg-white p-5 shadow-sm">
          <div class="mb-4 flex items-center justify-between gap-2">
            <h2 class="text-xl font-bold">検出結果</h2>

            <div class="flex gap-2">
              <button id="allBlurBtn" class="rounded-lg bg-blue-600 px-3 py-2 text-xs font-bold text-white" disabled>
                すべてぼかす
              </button>
              <button id="allClearBtn" class="rounded-lg bg-slate-200 px-3 py-2 text-xs font-bold text-slate-700" disabled>
                すべて解除
              </button>
            </div>
          </div>

          <div id="riskList" class="space-y-3 text-sm">
            まだ検出結果はありません。
          </div>
        </div>

        <div class="rounded-3xl bg-slate-900 p-5 text-white shadow-sm">
          <h2 class="mb-4 text-xl font-bold">OCR結果</h2>
          <pre id="ocrText" class="max-h-64 overflow-auto whitespace-pre-wrap rounded-2xl bg-white/10 p-4 text-sm">まだOCR結果はありません。</pre>
        </div>
      </aside>
    </section>
  </main>

  <script>
    

    const fileInput = document.getElementById("fileInput");
    const selectBtn = document.getElementById("selectBtn");
    const checkBtn = document.getElementById("checkBtn");
    const resetBtn = document.getElementById("resetBtn");
    const saveBlurBtn = document.getElementById("saveBlurBtn");
    const allBlurBtn = document.getElementById("allBlurBtn");
    const allClearBtn = document.getElementById("allClearBtn");

    const previewImage = document.getElementById("previewImage");
    const previewWrap = document.getElementById("previewWrap");
    const emptyState = document.getElementById("emptyState");
    const overlay = document.getElementById("overlay");

    const statusText = document.getElementById("statusText");
    const progressBar = document.getElementById("progressBar");
    const riskBadge = document.getElementById("riskBadge");
    const riskCount = document.getElementById("riskCount");
    const riskList = document.getElementById("riskList");
    const ocrText = document.getElementById("ocrText");

    let selectedFile = null;
    let imageBase64 = "";
    let risks = [];

    selectBtn.addEventListener("click", () => fileInput.click());

    fileInput.addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      selectedFile = file;

      const normalized = await normalizeImage(file);
      imageBase64 = normalized.base64;
      previewImage.src = normalized.dataUrl;

      previewWrap.classList.remove("hidden");
      emptyState.classList.add("hidden");

      previewImage.onload = () => {
        checkBtn.disabled = false;
        resetAll();
        setStatus("写真を読み込みました。AIチェックを押してください。");
      };
    });

    checkBtn.addEventListener("click", runVisionCheck);
    resetBtn.addEventListener("click", fullReset);
    saveBlurBtn.addEventListener("click", saveBlurredImage);

    allBlurBtn.addEventListener("click", () => {
      risks.forEach(r => r.blur = true);
      renderAll();
    });

    allClearBtn.addEventListener("click", () => {
      risks.forEach(r => r.blur = false);
      renderAll();
    });

    function normalizeImage(file) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        const reader = new FileReader();

        reader.onload = () => {
          img.onload = () => {
            const canvas = document.createElement("canvas");
            const maxWidth = 1600;

            let width = img.width;
            let height = img.height;

            if (width > maxWidth) {
              height = Math.round((height * maxWidth) / width);
              width = maxWidth;
            }

            canvas.width = width;
            canvas.height = height;

            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, width, height);

            const dataUrl = canvas.toDataURL("image/jpeg", 0.92);
            const base64 = dataUrl.split(",")[1];

            resolve({ dataUrl, base64 });
          };

          img.onerror = reject;
          img.src = reader.result;
        };

        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

async function runVisionCheck() {
  if (!imageBase64) {
    setStatus("エラー：画像データがまだ準備できていません。写真を選び直してください。");
    return;
  }
      risks = [];
      renderAll();
      setProgress(20);
      setStatus("Google Vision APIで解析中...");

      try {
const response = await fetch(
  "https://vision-api.chocopalace-kyoto.workers.dev/vision-api",
  {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      imageBase64: imageBase64
    })
  }
);        setProgress(60);

        const data = await response.json();
        console.log(data);

        if (!response.ok || data.error) {
          throw new Error(data.error || "Google Vision APIでエラーが発生しました");
        }

        const result = data.responses[0] || {};

        if (result.fullTextAnnotation?.text) {
          ocrText.textContent = result.fullTextAnnotation.text;
        } else {
          ocrText.textContent = "文字は読み取れませんでした。";
        }

        if (result.faceAnnotations) {
          result.faceAnnotations.forEach((face, index) => {
            const box = verticesToBox(face.boundingPoly.vertices);
            risks.push({
              id: `face-${index}`,
              label: "顔",
              memo: "顔が認識できる可能性があります。",
              color: "#ef4444",
              blur: true,
              ...box
            });
          });
        }

        if (result.textAnnotations) {
          result.textAnnotations.slice(1).forEach((text, index) => {
            const value = text.description || "";
            const type = judgeDangerousText(value);

            if (!type) return;

            const box = verticesToBox(text.boundingPoly.vertices);

            risks.push({
              id: `text-${index}`,
              label: type,
              memo: `「${value}」が写り込んでいます。`,
              color: getColorByLabel(type),
              blur: true,
              ...box
            });
          });
        }

        if (result.landmarkAnnotations) {
          result.landmarkAnnotations.forEach((landmark, index) => {
            if (!landmark.boundingPoly?.vertices) return;

            const box = verticesToBox(landmark.boundingPoly.vertices);

            risks.push({
              id: `landmark-${index}`,
              label: "ランドマーク",
              memo: landmark.description || "場所特定につながる可能性があります。",
              color: "#9333ea",
              blur: false,
              ...box
            });
          });
        }

        if (result.logoAnnotations) {
          result.logoAnnotations.forEach((logo, index) => {
            if (!logo.boundingPoly?.vertices) return;

            const box = verticesToBox(logo.boundingPoly.vertices);

            risks.push({
              id: `logo-${index}`,
              label: "ロゴ・店舗名",
              memo: logo.description || "店舗や団体が特定される可能性があります。",
              color: "#f97316",
              blur: false,
              ...box
            });
          });
        }

        setProgress(100);
        renderAll();

        if (risks.length === 0) {
          setStatus("解析完了。危険候補は見つかりませんでした。最後に目視でも確認してください。");
        } else {
          setStatus(`解析完了。${risks.length}件の危険候補を検出しました。ぼかす/ぼかさないを選べます。`);
        }
      } catch (e) {
        console.error(e);
        setStatus("エラー：" + e.message);
      }
    }

    function judgeDangerousText(text) {
      const value = String(text || "").replace(/\s/g, "");

      if (!value || value.length < 2) return null;

      if (/0\d{1,4}[-ー−]?\d{1,4}[-ー−]?\d{3,4}/.test(value)) {
        return "電話番号";
      }

      if (/\d{2,4}[-ー−]\d{1,4}/.test(value)) {
        return "ナンバー・番号";
      }

      if (/\d{3}[-ー−]?\d{4}/.test(value)) {
        return "郵便番号・住所";
      }

      if (/(都|道|府|県|市|区|町|村|丁目|番地|号)/.test(value) && value.length >= 3) {
        return "住所・地名";
      }

      if (/(学校|小学校|中学校|高校|大学|幼稚園|保育園|駅|病院|医院|クリニック|公園|店|支店|営業所|株式会社|モール|センター|ホール|PLAZA|SHOP|CAFE|HAPPY|MENU)/i.test(value)) {
        return "場所特定のヒント";
      }

      return null;
    }

    function getColorByLabel(label) {
      if (label.includes("電話")) return "#eab308";
      if (label.includes("ナンバー")) return "#22c55e";
      if (label.includes("住所")) return "#ec4899";
      if (label.includes("場所")) return "#2563eb";
      return "#64748b";
    }

    function verticesToBox(vertices) {
      const xs = vertices.map(v => Number(v.x || 0));
      const ys = vertices.map(v => Number(v.y || 0));

      const x = Math.min(...xs);
      const y = Math.min(...ys);
      const maxX = Math.max(...xs);
      const maxY = Math.max(...ys);

      return {
        x,
        y,
        w: Math.max(maxX - x, 24),
        h: Math.max(maxY - y, 24)
      };
    }

    function renderAll() {
      renderCircles();
      renderRiskList();
      updateRiskScore();
    }

    function renderCircles() {
      overlay.innerHTML = "";

      risks.forEach((risk) => {
        const div = document.createElement("div");
        div.className = "risk-circle";
        div.style.borderColor = risk.blur ? risk.color : "#94a3b8";
        div.style.opacity = risk.blur ? "1" : "0.45";

        const naturalW = previewImage.naturalWidth || 1;
        const naturalH = previewImage.naturalHeight || 1;
        const displayW = previewImage.clientWidth || naturalW;
        const displayH = previewImage.clientHeight || naturalH;

        div.style.left = `${(risk.x / naturalW) * displayW}px`;
        div.style.top = `${(risk.y / naturalH) * displayH}px`;
        div.style.width = `${Math.max((risk.w / naturalW) * displayW, 28)}px`;
        div.style.height = `${Math.max((risk.h / naturalH) * displayH, 28)}px`;

        const tag = document.createElement("div");
        tag.className = "risk-label";
        tag.style.background = risk.blur ? risk.color : "#64748b";
        tag.textContent = risk.blur ? risk.label : `${risk.label}：解除`;

        div.appendChild(tag);
        overlay.appendChild(div);
      });
    }

    function renderRiskList() {
      riskList.innerHTML = "";

      if (risks.length === 0) {
        riskList.textContent = "まだ検出結果はありません。";
        saveBlurBtn.disabled = true;
        allBlurBtn.disabled = true;
        allClearBtn.disabled = true;
        return;
      }

      risks.forEach((risk, index) => {
        const item = document.createElement("div");
        item.className = "rounded-2xl border border-slate-200 bg-slate-50 p-3";

        item.innerHTML = `
          <div class="flex items-center justify-between gap-3">
            <div class="flex items-start gap-3">
              <img
                src="${createRiskThumbnail(risk)}"
                class="h-16 w-16 shrink-0 rounded-xl border bg-white object-cover"
                alt="検出部分"
              />

              <div>
                <div class="font-bold text-slate-900">${escapeHtml(risk.label)}</div>
                <div class="mt-1 text-slate-600">${escapeHtml(risk.memo)}</div>
              </div>
            </div>

            <button
              class="blur-toggle shrink-0 rounded-xl px-3 py-2 text-xs font-bold ${
                risk.blur
                  ? "bg-blue-600 text-white"
                  : "border border-slate-300 bg-white text-slate-700"
              }"
              data-index="${index}"
            >
              ${risk.blur ? "ぼかす" : "ぼかさない"}
            </button>
          </div>
        `;

        riskList.appendChild(item);
      });

      document.querySelectorAll(".blur-toggle").forEach((button) => {
        button.addEventListener("click", () => {
          const index = Number(button.dataset.index);
          risks[index].blur = !risks[index].blur;
          renderAll();
        });
      });

      saveBlurBtn.disabled = false;
      allBlurBtn.disabled = false;
      allClearBtn.disabled = false;
    }

    function createRiskThumbnail(risk) {
      const canvas = document.createElement("canvas");
      const size = 96;
      canvas.width = size;
      canvas.height = size;

      const ctx = canvas.getContext("2d");

      const padding = Math.max(8, Math.min(risk.w, risk.h) * 0.35);

      const sx = Math.max(0, risk.x - padding);
      const sy = Math.max(0, risk.y - padding);
      const sw = Math.min(previewImage.naturalWidth - sx, risk.w + padding * 2);
      const sh = Math.min(previewImage.naturalHeight - sy, risk.h + padding * 2);

      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, size, size);

      ctx.drawImage(
        previewImage,
        sx,
        sy,
        sw,
        sh,
        0,
        0,
        size,
        size
      );

      return canvas.toDataURL("image/jpeg", 0.85);
    }

    function updateRiskScore() {
      riskCount.textContent = risks.length;

      if (risks.length === 0) {
        riskBadge.textContent = "低";
        riskBadge.className = "rounded-full bg-green-50 px-4 py-2 text-sm font-bold text-green-700";
      } else if (risks.length <= 3) {
        riskBadge.textContent = "中";
        riskBadge.className = "rounded-full bg-yellow-50 px-4 py-2 text-sm font-bold text-yellow-700";
      } else {
        riskBadge.textContent = "高";
        riskBadge.className = "rounded-full bg-red-50 px-4 py-2 text-sm font-bold text-red-700";
      }
    }

    function saveBlurredImage() {
      if (!previewImage.src || risks.length === 0) return;

      const canvas = document.createElement("canvas");
      canvas.width = previewImage.naturalWidth;
      canvas.height = previewImage.naturalHeight;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(previewImage, 0, 0, canvas.width, canvas.height);

      risks.filter(r => r.blur).forEach((risk) => {
        const padding = Math.max(12, Math.min(risk.w, risk.h) * 0.2);
        applyMosaicBlur(
          ctx,
          risk.x - padding,
          risk.y - padding,
          risk.w + padding * 2,
          risk.h + padding * 2
        );
      });

      const link = document.createElement("a");
      link.download = "sns-photo-blurred.png";
      link.href = canvas.toDataURL("image/png");
      link.click();

      setStatus("ぼかし画像を保存しました。");
    }

    function applyMosaicBlur(ctx, x, y, w, h) {
      const safeX = Math.max(0, Math.floor(x));
      const safeY = Math.max(0, Math.floor(y));
      const safeW = Math.min(ctx.canvas.width - safeX, Math.ceil(w));
      const safeH = Math.min(ctx.canvas.height - safeY, Math.ceil(h));

      if (safeW <= 0 || safeH <= 0) return;

      const scale = 0.06;
      const smallW = Math.max(1, Math.floor(safeW * scale));
      const smallH = Math.max(1, Math.floor(safeH * scale));

      const tempCanvas = document.createElement("canvas");
      tempCanvas.width = smallW;
      tempCanvas.height = smallH;

      const tempCtx = tempCanvas.getContext("2d");
      tempCtx.imageSmoothingEnabled = true;
      tempCtx.drawImage(ctx.canvas, safeX, safeY, safeW, safeH, 0, 0, smallW, smallH);

      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(tempCanvas, 0, 0, smallW, smallH, safeX, safeY, safeW, safeH);
      ctx.imageSmoothingEnabled = true;
    }

    function setProgress(value) {
      progressBar.style.width = `${value}%`;
    }

    function setStatus(message) {
      statusText.textContent = message;
    }

    function resetAll() {
      risks = [];
      overlay.innerHTML = "";
      riskList.textContent = "まだ検出結果はありません。";
      riskCount.textContent = "0";
      riskBadge.textContent = "未チェック";
      riskBadge.className = "rounded-full bg-green-50 px-4 py-2 text-sm font-bold text-green-700";
      ocrText.textContent = "まだOCR結果はありません。";
      saveBlurBtn.disabled = true;
      allBlurBtn.disabled = true;
      allClearBtn.disabled = true;
      setProgress(0);
    }

    function fullReset() {
      selectedFile = null;
      imageBase64 = "";
      fileInput.value = "";
      previewImage.removeAttribute("src");
      previewWrap.classList.add("hidden");
      emptyState.classList.remove("hidden");
      checkBtn.disabled = true;
      resetAll();
      setStatus("写真を選んでください。");
    }

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    window.addEventListener("resize", renderCircles);
  </script>
</body>
</html>
