<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QRコード作成ツール</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
  margin: 0;
  font-family: "Yu Gothic", "Meiryo", sans-serif;
  background: linear-gradient(135deg, #fff2f4, #f2fff9);
  color: #4b3a3a;
  padding: 40px 20px;
}

.header {
  text-align: center;
  margin-bottom: 30px;
}

h1 {
  font-size: 42px;
  margin: 10px 0;
}

.container {
  max-width: 1200px;
  margin: auto;
  display: grid;
  grid-template-columns: 1fr 0.9fr;
  gap: 24px;
}

.card {
  background: rgba(255,255,255,0.9);
  border: 1px solid #f4c5d1;
  border-radius: 24px;
  padding: 28px;
  box-shadow: 0 15px 40px rgba(220,80,120,.12);
}

label {
  display: block;
  font-weight: bold;
  margin: 20px 0 10px;
}

textarea,
input {
  width: 100%;
  box-sizing: border-box;
  border: 1px solid #f2b8c8;
  border-radius: 16px;
  padding: 15px;
  font-size: 16px;
}

textarea {
  min-height: 130px;
}

.row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}

.position-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

button {
  font-family: inherit;
  cursor: pointer;
}

.position-buttons button {
  border: 1px solid #f2b8c8;
  background: #fff;
  border-radius: 14px;
  padding: 15px;
  font-weight: bold;
}

.position-buttons button.active {
  color: #fff;
  background: linear-gradient(135deg, #f8759a, #ec3e75);
  border: none;
}

.text-color-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}

.text-color-btn {
  background: #fff;
  border: 1px solid #ead5da;
  border-radius: 12px;
  padding: 8px;
  height: 48px;
}

.text-color-btn.active {
  border-color: #ef4f7f;
  box-shadow: 0 0 0 3px rgba(239,79,127,.15);
}

.text-color-sample {
  width: 28px;
  height: 28px;
  border-radius: 7px;
  margin: auto;
  border: 1px solid #ddd;
}

.custom-color {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 10px;
  font-size: 13px;
  font-weight: bold;
}

.custom-color input {
  width: 54px;
  height: 40px;
  padding: 4px;
  border-radius: 10px;
}

.color-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-top: 10px;
}

.color-btn {
  background: #fff;
  border: 1px solid #ead5da;
  border-radius: 16px;
  padding: 12px 8px;
  font-weight: bold;
}

.color-btn.active {
  border-color: #ef4f7f;
  box-shadow: 0 0 0 3px rgba(239,79,127,.15);
}

.sample {
  width: 42px;
  height: 42px;
  border-radius: 8px;
  margin: 0 auto 8px;
  border: 1px solid #ddd;
}

.preview {
  text-align: center;
}

#finalCanvas {
  max-width: 100%;
  border-radius: 18px;
  box-shadow: 0 14px 32px rgba(0,0,0,.14);
  background: #fff;
}

.download {
  width: 100%;
  margin-top: 24px;
  border: none;
  border-radius: 16px;
  padding: 17px;
  color: #fff;
  font-size: 16px;
  font-weight: bold;
  background: linear-gradient(135deg, #f8759a, #ec3e75);
}

.note {
  margin-top: 20px;
  background: #fff3f6;
  border-radius: 16px;
  padding: 16px;
  line-height: 1.8;
  font-size: 14px;
}

#qrHidden {
  position: absolute;
  left: -9999px;
  top: -9999px;
}

@media(max-width: 900px) {
  .container,
  .row {
    grid-template-columns: 1fr;
  }

  .color-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}
</style>
</head>

<body>

<div class="header">
  <h1>QRコード作成ツール</h1>
  <p>URLやテキストを入力して、オリジナルのQRコードを作成！</p>
  <a class="back-link" href="../">← ツール一覧にもどる</a>
</div>

<div class="container">

  <div class="card">
    <label>QRコードにしたい文字列</label>
    <textarea id="qrText">https://example.com</textarea>

    <label>表示テキスト</label>
    <input type="text" id="displayText" value="公式サイトはこちら">

    <div class="row">
      <div>
        <label>表示テキストの色</label>

        <div class="text-color-grid">
          <button type="button" class="text-color-btn active" data-text-color="#000000">
            <div class="text-color-sample" style="background:#000000;"></div>
          </button>

          <button type="button" class="text-color-btn" data-text-color="#555555">
            <div class="text-color-sample" style="background:#555555;"></div>
          </button>

          <button type="button" class="text-color-btn" data-text-color="#d49aa5">
            <div class="text-color-sample" style="background:#d49aa5;"></div>
          </button>

          <button type="button" class="text-color-btn" data-text-color="#7fa3ad">
            <div class="text-color-sample" style="background:#7fa3ad;"></div>
          </button>

          <button type="button" class="text-color-btn" data-text-color="#79a887">
            <div class="text-color-sample" style="background:#79a887;"></div>
          </button>

          <button type="button" class="text-color-btn" data-text-color="instagram">
            <div class="text-color-sample" style="background:linear-gradient(135deg,#ff7a18,#ff2e8a,#9b5cff);"></div>
          </button>

          <button type="button" class="text-color-btn" data-text-color="#06c755">
            <div class="text-color-sample" style="background:#06c755;"></div>
          </button>

          <button type="button" class="text-color-btn" data-text-color="#ffffff">
            <div class="text-color-sample" style="background:#ffffff;"></div>
          </button>
        </div>

        <div class="custom-color">
          自由色
          <input type="color" id="textColorPicker" value="#000000">
        </div>
      </div>

      <div>
        <label>表示位置</label>
        <div class="position-buttons">
          <button type="button" id="topBtn">上に表示</button>
          <button type="button" id="bottomBtn" class="active">下に表示</button>
        </div>
      </div>
    </div>

    <label>QRコードのカラー</label>

    <div class="color-grid">
      <button type="button" class="color-btn active" data-color="black">
        <div class="sample" style="background:#000;"></div>黒
      </button>

      <button type="button" class="color-btn" data-color="gray">
        <div class="sample" style="background:#555;"></div>グレー
      </button>

      <button type="button" class="color-btn" data-color="dustyPink">
        <div class="sample" style="background:#d49aa5;"></div>くすみピンク
      </button>

      <button type="button" class="color-btn" data-color="dustyBlue">
        <div class="sample" style="background:#7fa3ad;"></div>くすみブルー
      </button>

      <button type="button" class="color-btn" data-color="dustyGreen">
        <div class="sample" style="background:#79a887;"></div>くすみグリーン
      </button>

      <button type="button" class="color-btn" data-color="instagram">
        <div class="sample" style="background:linear-gradient(135deg,#ff7a18,#ff2e8a,#9b5cff);"></div>
        インスタ風
      </button>

      <button type="button" class="color-btn" data-color="line">
        <div class="sample" style="background:#06c755;"></div>LINE風
      </button>

      <button type="button" class="color-btn" data-color="white">
        <div class="sample" style="background:#fff;"></div>白
      </button>
    </div>

    <div class="note">
      白を選ぶと、QRコードが見えるように背景を濃いグレーにします。<br>
      インスタ風はQRコード部分だけにグラデーションをかけます。
    </div>
  </div>

  <div class="card preview">
    <h2>プレビュー</h2>
    <canvas id="finalCanvas" width="420" height="520"></canvas>
    <button type="button" class="download" onclick="downloadQR()">画像をダウンロード（PNG）</button>
  </div>

</div>

<div id="qrHidden"></div>

<script>
let selectedColor = "black";
let selectedTextColor = "#000000";
let textPosition = "bottom";

const qrText = document.getElementById("qrText");
const displayText = document.getElementById("displayText");
const textColorPicker = document.getElementById("textColorPicker");
const finalCanvas = document.getElementById("finalCanvas");
const ctx = finalCanvas.getContext("2d");
const qrHidden = document.getElementById("qrHidden");

const colorMap = {
  black: "#000000",
  gray: "#555555",
  dustyPink: "#d49aa5",
  dustyBlue: "#7fa3ad",
  dustyGreen: "#79a887",
  line: "#06c755",
  white: "#ffffff"
};

function generateQR() {
  const text = qrText.value.trim();

  finalCanvas.width = 420;
  finalCanvas.height = 520;

  const bgColor = selectedColor === "white" ? "#333333" : "#ffffff";

  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);

  if (!text) {
    ctx.fillStyle = "#999";
    ctx.font = "18px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("文字列を入力してください", 210, 260);
    return;
  }

  qrHidden.innerHTML = "";

  new QRCode(qrHidden, {
    text: text,
    width: 330,
    height: 330,
    colorDark: "#000000",
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.H
  });

  setTimeout(function() {
    const qrCanvas = qrHidden.querySelector("canvas");

    if (!qrCanvas) {
      alert("QRコードを生成できませんでした。");
      return;
    }

    drawFinal(qrCanvas);
  }, 100);
}

function drawFinal(qrCanvas) {
  const qrSize = 330;
  const qrX = 45;
  const hasText = displayText.value.trim() !== "";
  const qrY = textPosition === "top" && hasText ? 135 : 55;

  const bgColor = selectedColor === "white" ? "#333333" : "#ffffff";

  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);

  const temp = document.createElement("canvas");
  temp.width = qrSize;
  temp.height = qrSize;

  const tctx = temp.getContext("2d");
  tctx.drawImage(qrCanvas, 0, 0, qrSize, qrSize);

  const imgData = tctx.getImageData(0, 0, qrSize, qrSize);
  const data = imgData.data;

  for (let i = 0; i < data.length; i += 4) {
    const isDark = data[i] < 128 && data[i + 1] < 128 && data[i + 2] < 128;

    if (!isDark) {
      data[i + 3] = 0;
    } else {
      if (selectedColor !== "instagram") {
        const rgb = hexToRgb(colorMap[selectedColor]);
        data[i] = rgb.r;
        data[i + 1] = rgb.g;
        data[i + 2] = rgb.b;
        data[i + 3] = 255;
      }
    }
  }

  tctx.putImageData(imgData, 0, 0);

  if (selectedColor === "instagram") {
    const gradCanvas = document.createElement("canvas");
    gradCanvas.width = qrSize;
    gradCanvas.height = qrSize;

    const gctx = gradCanvas.getContext("2d");
    const gradient = gctx.createLinearGradient(0, 0, qrSize, qrSize);

    gradient.addColorStop(0, "#ff7a18");
    gradient.addColorStop(0.45, "#ff2e8a");
    gradient.addColorStop(1, "#9b5cff");

    gctx.fillStyle = gradient;
    gctx.fillRect(0, 0, qrSize, qrSize);

    gctx.globalCompositeOperation = "destination-in";
    gctx.drawImage(temp, 0, 0);

    ctx.drawImage(gradCanvas, qrX, qrY);
  } else {
    ctx.drawImage(temp, qrX, qrY);
  }

  drawDisplayText();
}

function drawDisplayText() {
  const label = displayText.value.trim();
  if (!label) return;

  if (selectedTextColor === "instagram") {
    const gradient = ctx.createLinearGradient(0, 0, finalCanvas.width, 0);
    gradient.addColorStop(0, "#ff7a18");
    gradient.addColorStop(0.45, "#ff2e8a");
    gradient.addColorStop(1, "#9b5cff");
    ctx.fillStyle = gradient;
  } else {
    ctx.fillStyle = selectedTextColor;
  }

  ctx.font = "bold 26px sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  const y = textPosition === "top" ? 65 : 430;
  ctx.fillText(label, 210, y);
}

function hexToRgb(hex) {
  hex = hex.replace("#", "");
  const num = parseInt(hex, 16);

  return {
    r: (num >> 16) & 255,
    g: (num >> 8) & 255,
    b: num & 255
  };
}

function downloadQR() {
  const link = document.createElement("a");
  link.download = "qr-code.png";
  link.href = finalCanvas.toDataURL("image/png");
  link.click();
}

document.querySelectorAll(".color-btn").forEach(btn => {
  btn.addEventListener("click", function() {
    document.querySelectorAll(".color-btn").forEach(b => b.classList.remove("active"));
    this.classList.add("active");
    selectedColor = this.dataset.color;
    generateQR();
  });
});

document.querySelectorAll(".text-color-btn").forEach(btn => {
  btn.addEventListener("click", function() {
    document.querySelectorAll(".text-color-btn").forEach(b => b.classList.remove("active"));
    this.classList.add("active");

    selectedTextColor = this.dataset.textColor;

    if (selectedTextColor !== "instagram") {
      textColorPicker.value = selectedTextColor;
    }

    generateQR();
  });
});

textColorPicker.addEventListener("input", function() {
  selectedTextColor = this.value;
  document.querySelectorAll(".text-color-btn").forEach(b => b.classList.remove("active"));
  generateQR();
});

document.getElementById("topBtn").addEventListener("click", function() {
  textPosition = "top";
  this.classList.add("active");
  document.getElementById("bottomBtn").classList.remove("active");
  generateQR();
});

document.getElementById("bottomBtn").addEventListener("click", function() {
  textPosition = "bottom";
  this.classList.add("active");
  document.getElementById("topBtn").classList.remove("active");
  generateQR();
});

qrText.addEventListener("input", generateQR);
displayText.addEventListener("input", generateQR);

window.addEventListener("load", generateQR);
</script>

</body>
</html>
