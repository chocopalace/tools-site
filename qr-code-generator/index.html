<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QRコード作成ツール</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
    font-family:sans-serif;
    background:#f5f5f5;
    padding:30px;
    color:#333;
}

.container{
    max-width:1000px;
    margin:auto;
    display:grid;
    grid-template-columns:1fr 420px;
    gap:30px;
}

.box{
    background:#fff;
    border-radius:20px;
    padding:25px;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

h1{
    text-align:center;
    margin-bottom:30px;
}

label{
    display:block;
    font-weight:bold;
    margin-bottom:10px;
}

textarea,
input,
select{
    width:100%;
    padding:15px;
    border-radius:12px;
    border:1px solid #ddd;
    margin-bottom:20px;
    box-sizing:border-box;
    font-size:16px;
}

.color-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-bottom:20px;
}

.color-btn{
    border:3px solid transparent;
    border-radius:12px;
    cursor:pointer;
    overflow:hidden;
    background:#fff;
    padding:5px;
}

.color-btn.active{
    border-color:#000;
}

.color-preview{
    height:45px;
    border-radius:8px;
}

.position-buttons{
    display:flex;
    gap:10px;
}

.position-buttons button{
    flex:1;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#eee;
    cursor:pointer;
    font-weight:bold;
}

.position-buttons button.active{
    background:#000;
    color:#fff;
}

.preview-area{
    text-align:center;
}

#finalCanvas{
    max-width:100%;
    background:#fff;
    border-radius:20px;
}

.download-btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:15px;
    background:#000;
    color:#fff;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    margin-top:20px;
}

@media(max-width:768px){
    .container{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<h1>QRコード作成ツール</h1>

<div class="container">

<div class="box">

<label>QRコードにしたい文字列</label>
<textarea id="qrText" rows="5" placeholder="https://example.com"></textarea>

<label>表示テキスト</label>
<input type="text" id="displayText" placeholder="表示する文字">

<label>表示テキストの色</label>
<select id="textColor">
    <option value="#000000">黒</option>
    <option value="#666666">グレー</option>
    <option value="#b98b8b">くすみピンク</option>
    <option value="#7f9aa8">くすみブルー</option>
    <option value="#8fa68e">くすみグリーン</option>
    <option value="#ffffff">白</option>
</select>

<label>表示位置</label>
<div class="position-buttons">
    <button id="topBtn">上</button>
    <button id="bottomBtn" class="active">下</button>
</div>

<br>

<label>QRコードカラー</label>

<div class="color-grid">

<div class="color-btn active" data-color="#000000">
<div class="color-preview" style="background:#000000;"></div>
</div>

<div class="color-btn" data-color="#666666">
<div class="color-preview" style="background:#666666;"></div>
</div>

<div class="color-btn" data-color="#b98b8b">
<div class="color-preview" style="background:#b98b8b;"></div>
</div>

<div class="color-btn" data-color="#7f9aa8">
<div class="color-preview" style="background:#7f9aa8;"></div>
</div>

<div class="color-btn" data-color="#8fa68e">
<div class="color-preview" style="background:#8fa68e;"></div>
</div>

<div class="color-btn" data-color="#06c755">
<div class="color-preview" style="background:#06c755;"></div>
</div>

<div class="color-btn" data-color="instagram">
<div class="color-preview" style="background:linear-gradient(45deg,#feda75,#fa7e1e,#d62976,#962fbf);"></div>
</div>

<div class="color-btn" data-color="#ffffff">
<div class="color-preview" style="background:#ffffff;border:1px solid #ddd;"></div>
</div>

</div>

</div>

<div class="box preview-area">

<canvas id="finalCanvas"></canvas>

<button class="download-btn" onclick="downloadQR()">
PNGでダウンロード
</button>

</div>

</div>

<script>

let selectedColor = "#000000";
let textPosition = "bottom";

const qrText = document.getElementById("qrText");
const displayText = document.getElementById("displayText");
const textColor = document.getElementById("textColor");

document.querySelectorAll(".color-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{

        document.querySelectorAll(".color-btn").forEach(b=>{
            b.classList.remove("active");
        });

        btn.classList.add("active");
        selectedColor = btn.dataset.color;

        generateQR();
    });
});

document.getElementById("topBtn").addEventListener("click",()=>{
    textPosition = "top";

    document.getElementById("topBtn").classList.add("active");
    document.getElementById("bottomBtn").classList.remove("active");

    generateQR();
});

document.getElementById("bottomBtn").addEventListener("click",()=>{
    textPosition = "bottom";

    document.getElementById("bottomBtn").classList.add("active");
    document.getElementById("topBtn").classList.remove("active");

    generateQR();
});

qrText.addEventListener("input",generateQR);
displayText.addEventListener("input",generateQR);
textColor.addEventListener("change",generateQR);

async function generateQR(){

    const text = qrText.value.trim();

    if(!text){
        return;
    }

    const qrCanvas = document.createElement("canvas");

    const size = 350;

    const qr = new QRCode(qrCanvas,{
        text:text,
        width:size,
        height:size,
        colorDark:selectedColor === "instagram" ? "#000000" : selectedColor,
        colorLight:"#ffffff",
        correctLevel:QRCode.CorrectLevel.H
    });

    await new Promise(resolve=>setTimeout(resolve,300));

    const qrImg = qrCanvas.querySelector("img") || qrCanvas.querySelector("canvas");

    const canvas = document.getElementById("finalCanvas");

    const ctx = canvas.getContext("2d");

    canvas.width = 420;
    canvas.height = 520;

    ctx.fillStyle="#ffffff";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    let qrY = 80;

    if(textPosition === "top"){
        qrY = 130;
    }

    if(selectedColor === "instagram"){

        const tempCanvas = document.createElement("canvas");
        tempCanvas.width = size;
        tempCanvas.height = size;

        const tempCtx = tempCanvas.getContext("2d");
        tempCtx.drawImage(qrImg,0,0,size,size);

        const gradient = ctx.createLinearGradient(0,0,size,size);

        gradient.addColorStop(0,"#feda75");
        gradient.addColorStop(0.3,"#fa7e1e");
        gradient.addColorStop(0.6,"#d62976");
        gradient.addColorStop(1,"#962fbf");

        ctx.drawImage(tempCanvas,35,qrY,size,size);

        ctx.globalCompositeOperation = "source-atop";
        ctx.fillStyle = gradient;
        ctx.fillRect(35,qrY,size,size);
        ctx.globalCompositeOperation = "source-over";

    }else{

        ctx.drawImage(qrImg,35,qrY,size,size);

    }

    ctx.fillStyle = textColor.value;
    ctx.font = "bold 28px sans-serif";
    ctx.textAlign = "center";

    if(displayText.value){

        if(textPosition === "top"){
            ctx.fillText(displayText.value,210,60);
        }else{
            ctx.fillText(displayText.value,210,470);
        }

    }

}

function downloadQR(){

    const canvas = document.getElementById("finalCanvas");

    const link = document.createElement("a");

    link.download = "qr-code.png";

    link.href = canvas.toDataURL();

    link.click();

}

</script>

</body>
</html>
